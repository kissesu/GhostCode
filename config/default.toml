# GhostCode 默认配置文件
#
# 此文件为四层配置系统的第一层（最低优先级）
# 所有配置项均有合理默认值，更高优先级层可覆盖任意字段
#
# 层级优先级（从低到高）：
# 1. default（本文件，内嵌编译）
# 2. global (~/.ghostcode/config.toml)
# 3. project (./.ghostcode/config.toml)
# 4. runtime (通过 --config 显式指定)
#
# @author Atlas.oi
# @date 2026-03-04

# ============================================================
# 分发配置：Daemon 进程通信与单实例管理
# ============================================================
[distribution]
# Unix Socket 路径，用于 Plugin 与 Daemon 通信
socket_path = "/tmp/ghostcode.sock"
# PID 文件路径，用于单实例锁（防止多 Daemon 并发启动）
pid_file = "/tmp/ghostcode.pid"

# ============================================================
# 运行时配置：性能与并发参数
# ============================================================
[runtime]
# 单次请求超时时间（秒），超过此时间请求将被取消
request_timeout_secs = 30
# 关闭超时时间（秒），超过此时间 Daemon 强制退出
shutdown_timeout_secs = 10
# 最大 Actor 并发数，限制同时运行的 Claude Code 实例数量
max_actors = 8

# ============================================================
# 安全配置：主权模式与后端访问控制
# ============================================================
[security]
# 主权模式：
# - "strict"：严格模式，仅允许 allowed_backends 中的后端
# - "permissive"：宽松模式，允许所有后端（开发调试用）
sovereignty_mode = "strict"
# 允许访问的后端列表（仅在 strict 模式下生效）
allowed_backends = ["claude"]

# ============================================================
# 可观测性配置：日志与监控
# ============================================================
[observability]
# 日志级别：trace / debug / info / warn / error
log_level = "info"
# 日志文件路径（可选，不设置则仅输出到 stderr）
# log_file = "/tmp/ghostcode.log"
